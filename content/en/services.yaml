servicesPage:
  hero:
    eyebrow: Services
    title: Embroidery tailored to you
    description: >-
      From live events to corporate apparel and personal gifts. I help you from idea to finished embroidery, with clear
      communication and attention to detail.
  serviceLabel: Service
  benefits: Benefits
  perfectFor: Perfect for
  process: Process
services:
  live-events:
    title: Live Embroidery Events
    shortDescription: Live embroidery at events, festivals and brand activations.
    description: >-
      Turn your event into an experience people remember. During a live embroidery event, I personalise items on the
      spot while guests watch. It draws attention, creates interaction and gives guests something they'll actually want
      to keep.
    benefitsHeading: perfectFor
    benefits:
      - Brand activations
      - Festivals
      - Store openings
      - Corporate events
      - Product launches
    process:
      - Share your event plans and audience
      - We decide on the design and setup together
      - I arrive with equipment and materials
      - Guests receive live personalised embroidery during your event
  corporate:
    title: Embroidery for businesses
    shortDescription: Embroidered corporate apparel and merchandise.
    description: >-
      Professional embroidery for clothing, merchandise and promotional products. From small teams to larger orders: I
      help businesses make their brand visible with durable, high-quality embroidery solutions.
    benefits:
      - Embroidered apparel and merchandise
      - Consistent quality across larger orders
      - Custom logo and design digitising
      - Durable, high-quality materials
      - Professional finish for your brand
    process:
      - Discuss your brand and requirements
      - Digitise and sample the embroidery design
      - Approve the sample before production
      - Receive finished branded pieces
  gifts:
    title: Personal gifts with meaning
    shortDescription: Custom embroidery for special occasions.
    description: >-
      A gift becomes special when it's made specifically for someone. From births and weddings to anniversaries and
      other milestones: I create personalised embroidery projects that fit the moment and the person.
    benefits:
      - Unique gifts with personal meaning
      - Suitable for weddings, births and milestones
      - Wide range of items to embroider
      - Neatly wrapped and ready to give
      - Quality you can rely on
    process:
      - Tell me about the occasion and recipient
      - Choose your item and design together
      - I embroider your personalised piece on professional machines
      - Ready to give
  digitizing:
    title: Digitizing Embroidery Designs
    shortDescription: Professional embroidery file creation for logos and artwork.
    description: >-
      Transform your artwork, logos and illustrations into stitch-ready embroidery files. Whether you embroider yourself
      or work with a production partner, I create precise digitising tailored to your fabric, size and machine
      requirements.
    benefits:
      - Logo and artwork conversion to embroidery files
      - Optimised for different fabrics and stitch types
      - Compatible with commercial embroidery machines
      - Revisions to refine density, underlay and detail
      - Fast turnaround for brands, makers and small businesses
    process:
      - Send your artwork and project requirements
      - I review stitch feasibility and recommend adjustments
      - Receive a sample sew-out or digital proof when needed
      - Final embroidery file delivered ready to stitch
  fashion:
    title: Sewing & Creative Projects
    shortDescription: Production sewing, custom items and digital patterns.
    description: >-
      Beyond embroidery, I also handle sewing and creative projects. Think quilted cases, custom accessories, sample
      development and technical sewing, alongside digital sewing patterns available in the shop.
    benefits:
      - Small-batch and production sewing
      - Custom sewn items tailored to your brief
      - Sample development and technical sewing support
      - Digital sewing patterns with instant download
      - Clear communication from first sketch to finished piece
    process:
      - Share your idea, references and quantities
      - We discuss fabrics, construction and timeline
      - Samples or prototypes when needed
      - Production or delivery of your finished sewn pieces
