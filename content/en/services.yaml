servicesPage:
  hero:
    eyebrow: Services
    title: Bespoke embroidery experiences
    description: >-
      From captivating live events to heirloom gifts, discover how Raw Atelier can bring your vision to life through the
      art of embroidery.
  serviceLabel: Service
  benefits: Benefits
  process: Process
services:
  live-events:
    title: Live Embroidery Events
    shortDescription: Embroidery experiences at events, festivals and brand activations.
    description: >-
      Bring your event to life with live embroidery that captivates guests and creates lasting memories. From festivals
      to product launches, I set up an elegant embroidery station so attendees can watch the craft unfold and leave with
      a personalised piece.
    benefits:
      - Interactive guest experience that draws crowds
      - On-the-spot personalised embroidery
      - Elevates brand activations and festivals
      - Professional setup with premium materials
      - Memorable takeaways for every guest
    process:
      - Share your event vision and audience
      - We design the embroidery concept and setup
      - I arrive with full equipment and materials
      - Guests enjoy live embroidery throughout your event
  corporate:
    title: Corporate Embroidery
    shortDescription: Branded apparel and merchandise.
    description: >-
      Elevate your brand with meticulously embroidered corporate apparel and merchandise. From team uniforms to client
      gifts, every stitch reflects your brand's quality and attention to detail.
    benefits:
      - Premium branded apparel and merchandise
      - Consistent quality across large orders
      - Custom logo and design digitisation
      - Sustainable, high-quality materials
      - Professional presentation for your brand
    process:
      - Discuss your brand guidelines and needs
      - Digitise and sample your embroidery design
      - Approve the sample before production
      - Receive beautifully finished branded pieces
  gifts:
    title: Personalised Gifts
    shortDescription: Custom embroidery for special occasions.
    description: >-
      Celebrate life's meaningful moments with bespoke embroidered gifts. Whether it's a wedding, new baby, anniversary
      or thoughtful gesture, each piece is crafted with care to tell a personal story.
    benefits:
      - One-of-a-kind gifts with personal meaning
      - Perfect for weddings, births and milestones
      - Wide range of items to embroider
      - Elegant packaging available
      - Heirloom-quality craftsmanship
    process:
      - Tell me about the occasion and recipient
      - Choose your item and design together
      - I embroider your personalised piece on professional machines
      - Delivered beautifully wrapped and ready to gift
  digitizing:
    title: Digitizing Embroidery Designs
    shortDescription: Professional embroidery file creation for logos and artwork.
    description: >-
      Transform your artwork, logos and illustrations into stitch-ready embroidery files. Whether you embroider yourself
      or work with a production partner, I create precise digitizing tailored to your fabric, size and machine
      requirements.
    benefits:
      - Logo and artwork conversion to embroidery files
      - Optimized for different fabrics and stitch types
      - Compatible with commercial embroidery machines
      - Revisions to refine density, underlay and detail
      - Fast turnaround for brands, makers and small businesses
    process:
      - Send your artwork and project requirements
      - I review stitch feasibility and recommend adjustments
      - Receive a sample sew-out or digital proof when needed
      - Final embroidery file delivered ready to stitch
  fashion:
    title: Sewing & Creative Projects
    shortDescription: Production sewing, custom items and digital patterns.
    description: >-
      From small-batch production runs to one-off custom pieces, Raw Atelier handles sewing projects beyond embroidery.
      Think quilted cases, tailored accessories, sample development and made-to-measure textile work, alongside digital
      sewing patterns available in the shop.
    benefits:
      - Small-batch and production sewing
      - Custom sewn items tailored to your brief
      - Sample development and technical sewing support
      - Digital sewing patterns with instant download
      - Clear communication from first sketch to finished piece
    process:
      - Share your idea, references and quantities
      - We discuss fabrics, construction and timeline
      - Samples or prototypes when needed
      - Production or delivery of your finished sewn pieces
