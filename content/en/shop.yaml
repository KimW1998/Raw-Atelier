shopPage:
  hero:
    eyebrow: Shop
    title: Embroidered products and sewing patterns
    description: >-
      Browse personalised machine embroidery, baby gifts, keychains, patches, pouches and sewing patterns. Order and
      checkout happen at Raw Luxury Stitches.
  trust:
    description: >-
      After you place an order, Kim personally contacts you to confirm names, fabrics, colours and details before
      your piece is made.
  visit:
    title: Visit the full online shop
    description: >-
      See every product, personalization option and shipping detail at Raw Luxury Stitches.
    externalNote: Opens rawluxurystitches.com in a new tab
shop:
  tabsLabel: Shop categories
  emptyCategory: No products in this category yet. Visit the full shop or contact us for a custom order.
  productNote: Personalised and made to order. Opens in our online shop.
  viewFullShop: View full shop
  badges:
    handmade: Embroidered
    digital: Digital pattern
    madeToOrder: Made to order
  sections:
    babyGifts:
      eyebrow: Baby & gifts
      title: Personalised baby gifts
      description: Name banners, fabric balloons and special gifts for babies and celebrations.
    keychains:
      eyebrow: Keychains
      title: Small personalised gifts
      description: Embroidered keychains and charming details for teachers, friends and little thank-yous.
    patches:
      eyebrow: Patches
      title: Embroidered patches
      description: Patches for jackets, bags and accessories. First designs coming soon.
