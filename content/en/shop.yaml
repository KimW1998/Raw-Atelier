shopPage:
  hero:
    eyebrow: Shop
    title: Machine-embroidered pieces to cherish
    description: >-
      Browse personalized machine embroidery, baby gifts, keychains, patches, pouches, and sewing patterns, each made with care.
      Order and checkout happen at Raw Luxury Stitches.
  trust:
    description: >-
      After you place an order, Kim personally contacts you to confirm names, fabrics, colours, and details before
      your piece is made.
  visit:
    title: Visit the full online shop
    description: >-
      See every product, personalization option, and shipping detail at Raw Luxury Stitches.
    externalNote: Opens rawluxurystitches.com in a new tab
shop:
