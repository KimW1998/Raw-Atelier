metadata:
  home:
    title: Raw Atelier
    description: >-
      Premium creative embroidery studio in the Netherlands. Custom embroidery, live events, corporate branding,
      personalised gifts and embroidery digitizing. Made to tell your story.
  about:
    title: About
    description: >-
      Discover the story behind Raw Atelier, a premium embroidery studio in the Netherlands dedicated to craftsmanship,
      storytelling and bespoke textile experiences.
  services:
    title: Services
    description: >-
      Explore Raw Atelier's embroidery services: live events, corporate branding, personalised gifts, embroidery
      digitizing, sewing projects and fashion collaborations in the Netherlands.
  portfolio:
    title: Portfolio
    description: >-
      Browse Raw Atelier's embroidery portfolio: live events, corporate projects, personalised gifts, fashion
      collaborations and digitizing work.
  shop:
    title: Shop
    description: >-
      Discover machine-embroidered products from Raw Atelier. Personalised gifts, home textiles and accessories,
      available at our online shop.
  contact:
    title: Contact
    description: >-
      Get in touch with Raw Atelier for custom embroidery, live events, corporate orders, embroidery digitizing and
      personalised gifts. Based in the Netherlands.
  keywords: >-
    custom embroidery Netherlands, live embroidery events, embroidery digitizing, logo digitizing, personalized
    embroidery, corporate embroidery, Raw Atelier
