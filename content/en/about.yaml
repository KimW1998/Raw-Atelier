about:
  hero:
    title: The story behind the stitches
    description: Made to tell your story. Every piece that leaves this studio carries a piece of my heart.
  story:
    eyebrow: My Story
    title: From thread to atelier
    paragraph1: >-
      My journey with embroidery began as a quiet obsession — late nights with a needle, thread and an idea that
      wouldn't let go. What started as a personal creative outlet quickly revealed itself as something deeper: a way to
      capture stories, emotions and moments in a medium that lasts.
    paragraph2: >-
      Raw Atelier was born from the belief that embroidery is more than decoration. It's a language — one that speaks of
      care, patience and the beauty of things made slowly, by hand. Today, I partner with brands, event organisers,
      couples and creatives who share that appreciation for craft.
  philosophy:
    eyebrow: Philosophy
    title: Slow craft in a fast world
    description: >-
      In a world of mass production, I choose the deliberate path. Every project receives the same attention — whether
      it's a single handkerchief or a hundred corporate jackets.
    quote: >-
      Embroidery is not just about thread on fabric. It's about translating emotion into something tangible, something
      that can be held, worn and cherished.
  why:
    eyebrow: Why Raw Atelier
    title: What sets us apart
    items:
      quality:
        title: Handcrafted Quality
        description: Every stitch is placed by hand with premium threads and materials. No shortcuts, no compromises.
      story:
        title: Story-Driven Design
        description: We don't just embroider logos — we craft narratives. Your story guides every creative decision.
      connection:
        title: Personal Connection
        description: You work directly with me from first conversation to final delivery. No middlemen, no miscommunication.
  needle:
    eyebrow: Behind The Needle
    title: The art of intentional stitching
    paragraph1: >-
      Behind every Raw Atelier piece is hours of careful planning, sampling and stitching. I work with a curated
      selection of premium threads, sustainable fabrics and time-honoured techniques — combining traditional embroidery
      with contemporary design sensibilities.
    paragraph2: >-
      My studio is a space where creativity flows freely. Whether I'm setting up for a live event, digitising a
      corporate logo, or hand-stitching a wedding gift, the same passion and precision guide every movement of the
      needle.
  faq:
    eyebrow: FAQ
    title: Frequently asked questions
    description: Everything you need to know before we start stitching your story.
