about:
  hero:
    title: The story behind the stitches
    description: Made to tell your story. Every piece that leaves this studio carries a piece of my heart.
  story:
    eyebrow: My Story
    title: From thread to atelier
    paragraph1: >-
      My journey with embroidery began as a quiet obsession, with late nights spent on designs, thread and an idea that
      wouldn't let go. What started as a personal creative outlet quickly revealed itself as something deeper: a way to
      capture stories, emotions and moments in a medium that lasts.
    paragraph2: >-
      Raw Atelier was born from the belief that embroidery is more than decoration. It's a language that speaks of
      care, patience and the beauty of things made with precision on professional machines. Today, I partner with
      brands, event organisers, couples and creatives who share that appreciation for craft.
  philosophy:
    eyebrow: Philosophy
    title: Precise craft in a fast world
    description: >-
      In a world of mass production, I choose the deliberate path. Every project receives the same attention, whether
      it's a single handkerchief or a hundred corporate jackets.
    quote: >-
      Embroidery is not just about thread on fabric. It's about translating emotion into something tangible, something
      that can be held, worn and cherished.
  why:
    eyebrow: Why Raw Atelier
    title: What sets us apart
    items:
      quality:
        title: Machine Embroidery Quality
        description: Every design is stitched with premium threads and materials on professional embroidery machines. No shortcuts, no compromises.
      story:
        title: Story-Driven Design
        description: We don't just embroider logos. We craft narratives. Your story guides every creative decision.
      connection:
        title: Personal Connection
        description: You work directly with me from first conversation to final delivery. No middlemen, no miscommunication.
  needle:
    eyebrow: Behind The Machine
    title: The art of intentional stitching
    paragraph1: >-
      Behind every Raw Atelier piece is hours of careful planning, digitising and machine stitching. I work with a
      curated selection of premium threads, sustainable fabrics and professional embroidery techniques, combining
      traditional craftsmanship with contemporary design sensibilities.
    paragraph2: >-
      My studio is a space for creativity to flow freely. Whether I'm setting up for a live event, digitising a
      corporate logo, or embroidering a wedding gift, the same passion and precision guide every stitch on the machine.
  faq:
    eyebrow: FAQ
    title: Frequently asked questions
    description: Everything you need to know before we start stitching your story.
