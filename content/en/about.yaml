about:
  hero:
    title: The story behind the stitches
    description: Made to tell your story. Every piece that leaves this studio carries a piece of my heart.
  story:
    eyebrow: About me
    title: Hi, I'm Kim
    paragraph1: >-
      I'm the maker behind Raw Atelier. My journey with embroidery began as a quiet obsession, with late nights spent on
      designs, thread and an idea that wouldn't let go. What started as a personal creative outlet quickly became a way to
      capture stories, emotions and moments in a medium that lasts.
    paragraph2: >-
      Today I partner with brands, event organisers, couples and creatives who share my appreciation for craft. From my
      studio in the Netherlands, I bring the same care to a single keepsake as I do to a full live embroidery setup.
  philosophy:
    eyebrow: Philosophy
    title: Precise craft in a fast world
    description: >-
      In a world of mass production, I choose the deliberate path. Every project receives the same attention, whether
      it's a single handkerchief or a hundred corporate jackets.
    quote: >-
      Embroidery is not just about thread on fabric. It's about translating emotion into something tangible, something
      that can be held, worn and cherished.
  why:
    eyebrow: Why Raw Atelier
    title: What sets us apart
    items:
      quality:
        title: Machine Embroidery Quality
        description: Every design is stitched with premium threads and materials on professional embroidery machines. No shortcuts, no compromises.
      story:
        title: Story-Driven Design
        description: We don't just embroider logos. We craft narratives. Your story guides every creative decision.
      connection:
        title: Personal Connection
        description: You work directly with me from first conversation to final delivery. No middlemen, no miscommunication.
  atEvents:
    eyebrow: Live events
    title: Embroidery in action
    paragraph1: >-
      There's nothing quite like watching a design come to life in front of guests. I set up my embroidery station at
      festivals, brand activations, markets and private celebrations, so people can see the craft happen in real time.
    paragraph2: >-
      Guests leave with a personalised piece they watched being made, and events get a memorable experience that draws
      people in and stays with them long after the day is over.
  faq:
    eyebrow: FAQ
    title: Frequently asked questions
    description: Everything you need to know before we start stitching your story.
