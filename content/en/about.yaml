about:
  hero:
    title: Creative work with care
    description: >-
      I work with brands, businesses and individuals on embroidery projects that fit the moment and the people
      involved.
  story:
    eyebrow: About me
    title: Hi, I'm Kim
    paragraph1: >-
      Raw Atelier started from a love of embroidery, design and making things by hand.
    paragraph2: >-
      What began as a creative passion grew into a studio where I work with brands, businesses and individuals on
      unique embroidery projects. Whether it's a live event, corporate apparel, a personal gift or a creative custom
      project: I believe the best results come when quality, attention and personal contact come together.
  philosophy:
    eyebrow: Approach
    title: Careful work, personal contact
    description: >-
      Every project gets the same attention, whether it's a single gift or a larger corporate order. I work directly
      with you, from the first conversation to delivery.
    quote: >-
      Embroidery works best for me when the design fits the person, the moment or the brand. That's when a piece
      becomes something worth keeping.
  why:
    eyebrow: Why Raw Atelier
    title: What you can expect from me
    items:
      quality:
        title: Quality embroidery
        description: >-
          Every design is stitched with good threads and materials on professional embroidery machines. I pay attention
          to detail and a clean finish.
      story:
        title: Creative custom work
        description: >-
          No one-size-fits-all solutions. I think along about design, material and application, so the end result fits
          your project.
      connection:
        title: Personal contact
        description: >-
          You work directly with me from the first conversation to final delivery. Clear communication, no detours.
  atEvents:
    eyebrow: Live events
    title: Embroidery in action
    paragraph1: >-
      During a live embroidery event, I personalise items on the spot while guests watch. It draws attention, creates
      interaction and gives guests something they'll actually want to keep.
    paragraph2: >-
      I set up my embroidery station at festivals, brand activations, store openings and corporate events. Guests leave
      with a personalised piece they watched being made.
  faq:
    eyebrow: FAQ
    title: Frequently asked questions
    description: Everything you want to know before we get started.
