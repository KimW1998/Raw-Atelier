    babyGifts:
      eyebrow: Baby & cadeaus
      title: Gepersonaliseerde babycadeaus
      description: Naamslingers, stoffen ballonnen en bijzondere cadeaus voor baby's en feestmomenten.
    keychains:
      eyebrow: Keychains
      title: Kleine gepersonaliseerde cadeaus
