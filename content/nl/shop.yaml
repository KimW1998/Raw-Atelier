shopPage:
  hero:
    eyebrow: Shop
    title: Geborduurde producten en naaitpatronen
    description: >-
      Bekijk gepersonaliseerd machineborduurwerk, babycadeaus, keychains, patches, pouches en naaitpatronen. Bestellen
      en afrekenen gebeurt bij Raw Luxury Stitches.
  trust:
    description: >-
      Na je bestelling neemt Kim persoonlijk contact met je op om naam, stof, kleuren en details af te stemmen voordat
      je stuk wordt gemaakt.
  visit:
    title: Bezoek de volledige online shop
    description: >-
      Bekijk alle producten, personalisatie-opties en verzenddetails bij Raw Luxury Stitches.
    externalNote: Opent rawluxurystitches.com in een nieuw tabblad
shop:
