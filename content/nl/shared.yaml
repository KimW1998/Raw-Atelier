process:
  '1':
    title: Deel je idee
    description: Vertel me over je project, event of cadeau. We verkennen samen de mogelijkheden.
  '2':
    title: Ontwerp & plan
    description: Ik werk een borduurconcept uit op maat, met monsters indien nodig.
  '3':
    title: Maak met zorg
    description: Elk stuk wordt geborduurd op professionele machines, met aandacht voor detail en afwerking.
  '4':
    title: Lever af
    description: Je ontvangt het afgewerkte stuk, netjes afgewerkt en klaar om te gebruiken of te geven.
faq:
  '1':
    question: Hoe ver van tevoren moet ik boeken?
    answer: >-
      Voor events en grote bestellingen raad ik aan om 4–6 weken van tevoren te boeken. Kleinere gepersonaliseerde
      cadeaus kunnen vaak binnen 2–3 weken. Neem contact op en we vinden een planning die werkt.
  '2':
    question: Reis je voor live borduur events?
    answer: >-
      Ja! Ik reis door heel Nederland en internationaal voor events, festivals en merkactivaties. Reiskosten worden
      besproken tijdens de planningsfase.
  '3':
    question: Welke items kunnen geborduurd worden?
    answer: >-
      Bijna alles van stof: kleding, tassen, handdoeken, dekens, zakdoeken, petten en meer. Twijfel je? Stuur me een
      bericht en we kijken samen wat mogelijk is.
  '4':
    question: Kan ik een monster zien vóór een grote bestelling?
    answer: >-
      Absoluut. Voor bedrijfs- en grotere projecten lever ik altijd een monster ter goedkeuring voordat de volledige
      bestelling wordt geproduceerd.
  '5':
    question: Bied je borduurdigitalisering aan?
    answer: >-
      Ja! Ik zet logo's, artwork en illustraties om naar professionele borduurbestanden. Stuur je design, stof en
      formaatwensen en je ontvangt een stitch-ready bestand met revisies indien nodig.
