home:
  hero:
    headline: Borduurwerk dat jouw verhaal vertelt
    intro: >-
      Maatwerk machineborduurwerk voor events, merken en dierbare momenten. Elke steek is met intentie geplaatst,
      gemaakt om te vieren wat voor jou het belangrijkst is.
  services:
    eyebrow: Wat ik aanbied
    title: Diensten met zorg gemaakt
    description: >-
      Van live event-ervaringen tot op maat gemaakte cadeaus. Elke dienst is ontworpen om jouw verhaal tot leven te
      brengen door professioneel machineborduurwerk.
  featured:
    eyebrow: Portfolio
    title: Uitgelicht werk
    description: Een glimp van de verhalen die ik tot leven heb gebracht door borduurwerk.
  about:
    eyebrow: Over ons
    title: Vakmanschap en storytelling
    paragraph1: >-
      Raw Atelier is geboren uit een liefde voor nauwkeurig vakmanschap en het geloof dat elk borduurwerk betekenis
      moet dragen. Wat begon als een passie voor machineborduurwerk, is uitgegroeid tot een atelier dat samenwerkt met
      merken, koppels en creatieven om textielervaringen te creëren die lang blijven hangen.
    paragraph2: >-
      Vanuit Nederland werk ik met klanten die authenticiteit, kwaliteit en de stille luxe van professioneel
      machinegeborduurde stukken waarderen.
  testimonials:
    eyebrow: Lieve woorden
    title: Wat klanten zeggen
    description: Reviews uit onze Etsy-shop, RawLuxuryStitches.
  process:
    eyebrow: Hoe het werkt
    title: Van visie tot afgewerkt stuk
    description: Een doordacht, collaboratief proces zorgt ervoor dat elk borduurproject de verwachtingen overtreft.
  instagram:
    eyebrow: Instagram
    title: Nieuw op Instagram
    profileHint: Volg voor nieuwe projecten, procesvideo's en inspiratie.
