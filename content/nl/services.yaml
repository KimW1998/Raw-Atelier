servicesPage:
  hero:
    eyebrow: Diensten
    title: Borduurervaringen op maat
    description: >-
      Van boeiende live events tot erfstuk-cadeaus. Ontdek hoe Raw Atelier jouw visie tot leven kan brengen door de
      kunst van borduren.
  serviceLabel: Dienst
  benefits: Voordelen
  process: Proces
services:
  live-events:
    title: Live Borduur Events
    shortDescription: Borduurervaringen op events, festivals en merkactivaties.
    description: >-
      Breng je event tot leven met live borduurwerk dat gasten boeit en blijvende herinneringen creëert. Van festivals
      tot productlanceringen. Ik zet een elegant borduurstation op zodat bezoekers het ambacht zien ontstaan en
      vertrekken met een gepersonaliseerd stuk.
    benefits:
      - Interactieve gastenervaring die menigten trekt
      - Gepersonaliseerd borduurwerk ter plekke
      - Verhoogt merkactivaties en festivals
      - Professionele opstelling met premium materialen
      - Onvergetelijke giveaways voor elke gast
    process:
      - Deel je eventvisie en doelgroep
      - We ontwerpen het borduurconcept en de opstelling
      - Ik kom met volledige uitrusting en materialen
      - Gasten genieten van live borduurwerk tijdens je event
  corporate:
    title: Corporate Borduurwerk
    shortDescription: Geborduurde bedrijfskleding en merchandise.
    description: >-
      Versterk je merk met nauwkeurig geborduurde corporate kleding en merchandise. Van teamuniformen tot klantcadeaus,
      elke steek weerspiegelt de kwaliteit en aandacht voor detail van je merk.
    benefits:
      - Premium geborduurde kleding en merchandise
      - Consistente kwaliteit bij grote bestellingen
      - Maatwerk logo- en designdigitalisatie
      - Duurzame, hoogwaardige materialen
      - Professionele presentatie voor je merk
    process:
      - Bespreek je merkrichtlijnen en behoeften
      - Digitaliseer en bemonster je borduurdesign
      - Keur het monster goed vóór productie
      - Ontvang prachtig afgewerkte merkstukken
  gifts:
    title: Gepersonaliseerde Cadeaus
    shortDescription: Maatwerk borduurwerk voor bijzondere momenten.
    description: >-
      Vier de betekenisvolle momenten in het leven met op maat gemaakte geborduurde cadeaus. Of het nu een bruiloft,
      geboorte, jubileum of attent gebaar is. Elk stuk wordt met zorg gemaakt om een persoonlijk verhaal te vertellen.
    benefits:
      - Unieke cadeaus met persoonlijke betekenis
      - Perfect voor bruiloften, geboortes en mijlpalen
      - Breed scala aan items om te borduren
      - Elegante verpakking beschikbaar
      - Ambacht van erfstuk-kwaliteit
    process:
      - Vertel me over de gelegenheid en de ontvanger
      - Kies samen je item en design
      - Ik borduur je gepersonaliseerde stuk op professionele machines
      - Prachtig verpakt en klaar om te geven
  digitizing:
    title: Digitaliseren van Borduurdesigns
    shortDescription: Professionele borduurbestanden voor logo's en artwork.
    description: >-
      Zet je artwork, logo's en illustraties om naar borduurbestanden die klaar zijn om te stikken. Of je nu zelf
      borduurt of met een productiepartner werkt. Ik maak nauwkeurige digitalisering op maat van je stof, formaat en
      machine.
    benefits:
      - Omzetting van logo's en artwork naar borduurbestanden
      - Geoptimaliseerd voor verschillende stoffen en steektypes
      - Compatibel met professionele borduurmachines
      - Revisies om dichtheid, underlay en detail te verfijnen
      - Snelle doorlooptijd voor merken, makers en kleine bedrijven
    process:
      - Stuur je artwork en projectwensen
      - Ik beoordeel de haalbaarheid en adviseer bijsturingen
      - Ontvang indien nodig een proefsteek of digitaal proof
      - Definitief borduurbestand geleverd en klaar om te stikken
  fashion:
    title: Naaiwerk & Creatieve Projecten
    shortDescription: Productiewerk, maatwerk en digitale naaipatronen.
    description: >-
      Van kleine productieseries tot unieke custom stukken: Raw Atelier verzorgt naaiwerk dat verder gaat dan borduren.
      Denk aan quilted cases, accessoires op maat, sample-ontwikkeling en technisch naaiwerk, naast digitale
      naaipatronen die je in de shop vindt.
    benefits:
      - Kleine series en productiewerk
      - Custom naaistukken afgestemd op jouw wens
      - Sample-ontwikkeling en technische naai-ondersteuning
      - Digitale naaipatronen met directe download
      - Duidelijke communicatie van eerste schets tot afgewerkt stuk
    process:
      - Deel je idee, referenties en gewenste aantallen
      - We bespreken stoffen, constructie en planning
      - Monsters of prototypes indien nodig
      - Productie of levering van je afgewerkte naaistukken
