servicesPage:
  hero:
    eyebrow: Diensten
    title: Borduurwerk op maat
    description: >-
      Van live events tot bedrijfskleding en persoonlijke cadeaus. Ik help je van idee tot afgewerkt borduurwerk, met
      duidelijke communicatie en aandacht voor detail.
  serviceLabel: Dienst
  benefits: Voordelen
  perfectFor: Perfect voor
  process: Proces
services:
  live-events:
    title: Live Borduur Events
    shortDescription: Live borduurwerk op events, festivals en merkactivaties.
    description: >-
      Maak van je event een ervaring die mensen onthouden. Tijdens een live borduur event personaliseer ik items ter
      plekke terwijl bezoekers meekijken. Het trekt aandacht, zorgt voor interactie en geeft gasten iets mee dat ze
      écht willen bewaren.
    benefitsHeading: perfectFor
    benefits:
      - Merkactivaties
      - Festivals
      - Winkelopeningen
      - Bedrijfsevenementen
      - Productlanceringen
    process:
      - Deel je eventplannen en doelgroep
      - We bepalen samen het design en de opstelling
      - Ik kom met uitrusting en materialen
      - Gasten krijgen live gepersonaliseerd borduurwerk tijdens je event
  corporate:
    title: Borduurwerk voor bedrijven
    shortDescription: Geborduurde bedrijfskleding en merchandise.
    description: >-
      Professioneel borduurwerk voor kleding, merchandise en promotionele producten. Van kleine teams tot grotere
      bestellingen: ik help bedrijven hun merk zichtbaar te maken met duurzame en hoogwaardige borduurwerkoplossingen.
    benefits:
      - Geborduurde kleding en merchandise
      - Consistente kwaliteit bij grotere bestellingen
      - Logo- en designdigitalisatie op maat
      - Duurzame, hoogwaardige materialen
      - Professionele afwerking voor je merk
    process:
      - Bespreek je merk en wensen
      - Digitaliseer en bemonster het borduurdesign
      - Keur het monster goed vóór productie
      - Ontvang afgewerkte merkstukken
  gifts:
    title: Persoonlijke cadeaus met betekenis
    shortDescription: Maatwerk borduurwerk voor bijzondere momenten.
    description: >-
      Een cadeau wordt bijzonder wanneer het speciaal voor iemand gemaakt is. Van geboortes en bruiloften tot jubilea
      en andere mijlpalen: ik maak gepersonaliseerde borduurprojecten die aansluiten bij het moment en de persoon.
    benefits:
      - Unieke cadeaus met persoonlijke betekenis
      - Geschikt voor bruiloften, geboortes en mijlpalen
      - Breed scala aan items om te borduren
      - Netjes verpakt en klaar om te geven
      - Kwaliteit waar je op kunt vertrouwen
    process:
      - Vertel me over de gelegenheid en de ontvanger
      - Kies samen je item en design
      - Ik borduur je gepersonaliseerde stuk op professionele machines
      - Klaar om te geven
  digitizing:
    title: Digitaliseren van Borduurdesigns
    shortDescription: Professionele borduurbestanden voor logo's en artwork.
    description: >-
      Zet je artwork, logo's en illustraties om naar borduurbestanden die klaar zijn om te stikken. Of je nu zelf
      borduurt of met een productiepartner werkt: ik maak nauwkeurige digitalisering op maat van je stof, formaat en
      machine.
    benefits:
      - Omzetting van logo's en artwork naar borduurbestanden
      - Geoptimaliseerd voor verschillende stoffen en steektypes
      - Compatibel met professionele borduurmachines
      - Revisies om dichtheid, underlay en detail te verfijnen
      - Snelle doorlooptijd voor merken, makers en kleine bedrijven
    process:
      - Stuur je artwork en projectwensen
      - Ik beoordeel de haalbaarheid en adviseer bijsturingen
      - Ontvang indien nodig een proefsteek of digitaal proof
      - Definitief borduurbestand geleverd en klaar om te stikken
  fashion:
    title: Naaiwerk & Creatieve Projecten
    shortDescription: Productiewerk, maatwerk en digitale naaipatronen.
    description: >-
      Naast borduurwerk verzorg ik ook naaiwerk en creatieve projecten. Denk aan quilted cases, accessoires op maat,
      sample-ontwikkeling en technisch naaiwerk, naast digitale naaipatronen die je in de shop vindt.
    benefits:
      - Kleine series en productiewerk
      - Custom naaistukken afgestemd op jouw wens
      - Sample-ontwikkeling en technische naai-ondersteuning
      - Digitale naaipatronen met directe download
      - Duidelijke communicatie van eerste schets tot afgewerkt stuk
    process:
      - Deel je idee, referenties en gewenste aantallen
      - We bespreken stoffen, constructie en planning
      - Monsters of prototypes indien nodig
      - Productie of levering van je afgewerkte naaistukken
