about:
  hero:
    title: Creatief met aandacht
    description: >-
      Ik werk met merken, bedrijven en particulieren aan borduurprojecten die passen bij het moment en de mensen
      eromheen.
  story:
    eyebrow: Over mij
    title: Hoi, ik ben Kim
    paragraph1: >-
      Raw Atelier begon vanuit een liefde voor borduurwerk, ontwerpen en creatief bezig zijn.
    paragraph2: >-
      Wat begon als een creatieve passie groeide uit tot een studio waar ik samenwerk met merken, bedrijven en
      particulieren aan unieke borduurprojecten. Of het nu gaat om een live event, bedrijfskleding, een persoonlijk
      cadeau of een creatief maatwerkproject: ik geloof dat de mooiste resultaten ontstaan wanneer kwaliteit, aandacht
      en persoonlijk contact samenkomen.
  philosophy:
    eyebrow: Aanpak
    title: Zorgvuldig werk, persoonlijk contact
    description: >-
      Elk project krijgt dezelfde aandacht, of het nu één cadeau is of een grotere bedrijfsbestelling. Ik werk
      rechtstreeks met je mee, van het eerste gesprek tot de levering.
    quote: >-
      Borduren is voor mij het mooiste wanneer het ontwerp past bij de persoon, het moment of het merk. Dan wordt een
      stuk echt iets om te bewaren.
  why:
    eyebrow: Waarom Raw Atelier
    title: Wat je van mij kunt verwachten
    items:
      quality:
        title: Kwaliteit borduurwerk
        description: >-
          Elk design wordt gestikt met goede garens en materialen op professionele borduurmachines. Ik let op detail en
          een nette afwerking.
      story:
        title: Creatief maatwerk
        description: >-
          Geen standaardoplossingen. Ik denk mee over design, materiaal en toepassing, zodat het eindresultaat past bij
          jouw project.
      connection:
        title: Persoonlijk contact
        description: >-
          Je werkt rechtstreeks met mij van het eerste gesprek tot de uiteindelijke levering. Duidelijke communicatie,
          zonder omwegen.
  atEvents:
    eyebrow: Live events
    title: Borduren in actie
    paragraph1: >-
      Tijdens een live borduur event personaliseer ik items ter plekke terwijl bezoekers meekijken. Het trekt
      aandacht, zorgt voor interactie en geeft gasten iets mee dat ze écht willen bewaren.
    paragraph2: >-
      Ik zet mijn borduurstation neer op festivals, merkactivaties, winkelopeningen en bedrijfsevenementen. Gasten
      vertrekken met een gepersonaliseerd stuk dat ze hebben zien ontstaan.
  faq:
    eyebrow: FAQ
    title: Veelgestelde vragen
    description: Alles wat je wilt weten voordat we aan de slag gaan.
