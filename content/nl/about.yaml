about:
  hero:
    title: Het verhaal achter de steken
    description: Gemaakt om jouw verhaal te vertellen. Elk stuk dat dit atelier verlaat, draagt een stukje van mijn hart.
  story:
    eyebrow: Mijn verhaal
    title: Van draad tot atelier
    paragraph1: >-
      Mijn reis met borduren begon als een stille obsessie, met late avonden vol designs, draad en een idee dat niet
      losliet. Wat begon als een persoonlijke creatieve uitlaatklep, bleek al snel iets diepers: een manier om verhalen,
      emoties en momenten vast te leggen in een medium dat blijft.
    paragraph2: >-
      Raw Atelier is geboren uit het geloof dat borduren meer is dan decoratie. Het is een taal die spreekt van
      zorg, geduld en de schoonheid van dingen die met precisie op professionele machines worden gemaakt. Vandaag werk
      ik samen met merken, eventorganisatoren, koppels en creatieven die die waardering voor ambacht delen.
  philosophy:
    eyebrow: Filosofie
    title: Nauwkeurig vakmanschap in een snelle wereld
    description: >-
      In een wereld van massaproductie kies ik het bedachtzame pad. Elk project krijgt dezelfde aandacht, of het nu een
      enkele zakdoek is of honderd corporate jassen.
    quote: >-
      Borduren gaat niet alleen over draad op stof. Het gaat over het vertalen van emotie naar iets tastbaars, iets dat
      vastgehouden, gedragen en gekoesterd kan worden.
  why:
    eyebrow: Waarom Raw Atelier
    title: Wat ons onderscheidt
    items:
      quality:
        title: Kwaliteit machineborduurwerk
        description: Elk design wordt gestikt met premium garens en materialen op professionele borduurmachines. Geen shortcuts, geen compromissen.
      story:
        title: Verhaalgedreven design
        description: We borduren niet alleen logo's. We creëren verhalen. Jouw verhaal begeleidt elke creatieve beslissing.
      connection:
        title: Persoonlijke connectie
        description: >-
          Je werkt rechtstreeks met mij van het eerste gesprek tot de uiteindelijke levering. Geen tussenpersonen, geen
          miscommunicatie.
  needle:
    eyebrow: Achter de machine
    title: De kunst van intentioneel steken
    paragraph1: >-
      Achter elk Raw Atelier-stuk zitten uren van zorgvuldige planning, digitalisering en machinesteken. Ik werk met een
      gecureerde selectie van premium garens, duurzame stoffen en professionele borduurtechnieken. Traditioneel
      vakmanschap gecombineerd met eigentijdse designprincipes.
    paragraph2: >-
      Mijn atelier is een ruimte voor creativiteit. Of ik nu een live event opzet, een corporate logo digitaliseer of
      een bruiloftscadeau borduur. Dezelfde passie en precisie begeleiden elke steek op de machine.
  faq:
    eyebrow: FAQ
    title: Veelgestelde vragen
    description: Alles wat je moet weten voordat we jouw verhaal gaan borduren.
