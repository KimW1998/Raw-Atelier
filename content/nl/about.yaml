about:
  hero:
    title: Het verhaal achter de steken
    description: Gemaakt om jouw verhaal te vertellen. Elk stuk dat dit atelier verlaat, draagt een stukje van mijn hart.
  story:
    eyebrow: Over mij
    title: Hoi, ik ben Kim
    paragraph1: >-
      Ik ben de maker achter Raw Atelier. Mijn reis met borduren begon als een stille obsessie, met late avonden vol
      designs, draad en een idee dat niet losliet. Wat begon als een persoonlijke creatieve uitlaatklep, werd al snel een
      manier om verhalen, emoties en momenten vast te leggen in een medium dat blijft.
    paragraph2: >-
      Vandaag werk ik samen met merken, eventorganisatoren, koppels en creatieven die die waardering voor ambacht delen.
      Vanuit mijn atelier in Nederland steek ik dezelfde zorg in één keepsake als in een volledige live borduur-opstelling.
  philosophy:
    eyebrow: Filosofie
    title: Nauwkeurig vakmanschap in een snelle wereld
    description: >-
      In een wereld van massaproductie kies ik het bedachtzame pad. Elk project krijgt dezelfde aandacht, of het nu een
      enkele zakdoek is of honderd corporate jassen.
    quote: >-
      Borduren gaat niet alleen over draad op stof. Het gaat over het vertalen van emotie naar iets tastbaars, iets dat
      vastgehouden, gedragen en gekoesterd kan worden.
  why:
    eyebrow: Waarom Raw Atelier
    title: Wat ons onderscheidt
    items:
      quality:
        title: Kwaliteit machineborduurwerk
        description: Elk design wordt gestikt met premium garens en materialen op professionele borduurmachines. Geen shortcuts, geen compromissen.
      story:
        title: Verhaalgedreven design
        description: We borduren niet alleen logo's. We creëren verhalen. Jouw verhaal begeleidt elke creatieve beslissing.
      connection:
        title: Persoonlijke connectie
        description: >-
          Je werkt rechtstreeks met mij van het eerste gesprek tot de uiteindelijke levering. Geen tussenpersonen, geen
          miscommunicatie.
  atEvents:
    eyebrow: Live events
    title: Borduren in actie
    paragraph1: >-
      Er is weinig dat zo bijzonder is als een design dat tot leven komt voor de ogen van je gasten. Ik zet mijn
      borduurstation neer op festivals, merkactivaties, markten en privéfeesten, zodat mensen het ambacht in real time
      kunnen zien gebeuren.
    paragraph2: >-
      Gasten vertrekken met een gepersonaliseerd stuk dat ze hebben zien ontstaan, en events krijgen een onvergetelijke
      ervaring die nog lang blijft hangen.
  faq:
    eyebrow: FAQ
    title: Veelgestelde vragen
    description: Alles wat je moet weten voordat we jouw verhaal gaan borduren.
