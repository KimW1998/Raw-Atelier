    title: Raw Atelier
    description: >-
      Creatieve borduurstudio in Nederland. Maatwerk borduurwerk, live events, bedrijfskleding, gepersonaliseerde
      cadeaus en borduurdigitalisering. Gemaakt met aandacht in Nederland.
  about:
    title: Over ons
    description: >-
      Maak kennis met Kim en Raw Atelier: een creatieve borduurstudio in Nederland, gespecialiseerd in maatwerk,
      creativiteit en persoonlijke samenwerking.
  services:
    title: Diensten
    description: >-
      Ontdek de borduurdiensten van Raw Atelier: live events, bedrijfskleding, gepersonaliseerde cadeaus,
      borduurdigitalisering, naaiwerk en creatieve projecten in Nederland.
  portfolio:
    title: Portfolio
    description: >-
      Bekijk het borduurportfolio van Raw Atelier: live events, bedrijfsprojecten, gepersonaliseerde cadeaus,
      naaiwerk en digitaliseringswerk.
  shop:
    title: Shop
    description: >-
      Ontdek machinegeborduurde producten van Raw Atelier. Gepersonaliseerde cadeaus, accessoires en naaitpatronen,
      verkrijgbaar in onze online shop.
  contact:
    title: Contact
    description: >-
      Neem contact op met Raw Atelier voor maatwerk borduurwerk, live events, bedrijfsbestellingen,
      borduurdigitalisering en gepersonaliseerde cadeaus. Gevestigd in Nederland.
  keywords: >-
    maatwerk borduurwerk Nederland, live borduur events, borduur digitalisering, logo digitalisering, gepersonaliseerd borduurwerk, corporate
