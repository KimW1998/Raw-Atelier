metadata:
  home:
    title: Raw Atelier
    description: >-
      Premium creatief borduuratelier in Nederland. Maatwerk borduurwerk, live events, corporate branding,
      gepersonaliseerde cadeaus en workshops. Gemaakt om jouw verhaal te vertellen.
  about:
    title: Over ons
    description: >-
      Ontdek het verhaal achter Raw Atelier — een premium borduuratelier in Nederland, gewijd aan vakmanschap,
      storytelling en op maat gemaakte textielervaringen.
  services:
    title: Diensten
    description: >-
      Ontdek de borduurdiensten van Raw Atelier — live events, corporate branding, gepersonaliseerde cadeaus, workshops
      en modecollaboraties in Nederland.
  portfolio:
    title: Portfolio
    description: >-
      Bekijk het borduurportfolio van Raw Atelier — live events, corporate projecten, gepersonaliseerde cadeaus,
      modecollaboraties en workshops.
  shop:
    title: Shop
    description: >-
      Ontdek handgemaakte geborduurde producten van Raw Atelier. Gepersonaliseerde cadeaus, huistextiel en accessoires —
      verkrijgbaar in onze online shop.
  contact:
    title: Contact
    description: >-
      Neem contact op met Raw Atelier voor maatwerk borduurwerk, live events, corporate bestellingen, workshops en
      gepersonaliseerde cadeaus. Gevestigd in Nederland.
  keywords: >-
    maatwerk borduurwerk Nederland, live borduur events, borduur workshops, gepersonaliseerd borduurwerk, corporate
    borduurwerk, Raw Atelier
