<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Raw Atelier CMS</title>
    <link
      id="cms-config"
      href="/admin/config.yml"
      type="text/yaml"
      rel="cms-config-url"
    />
    <script>
      (function () {
        var isLocal =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";
        if (isLocal) {
          document.getElementById("cms-config").href =
            "/admin/config.local.yml";
        }
      })();
    </script>
  </head>
  <body>
    <div id="nc-root"></div>
    <script>
      (function () {
        var isLocal =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";
        if (isLocal) return;

        var script = document.createElement("script");
        script.src =
          "https://identity.netlify.com/v1/netlify-identity-widget.js";
        script.onload = function () {
          if (!window.netlifyIdentity) return;

          window.netlifyIdentity.on("init", function () {
            window.netlifyIdentity.on("login", function () {
              window.location.href = "/admin/";
            });
          });
        };
        document.head.appendChild(script);
      })();
    </script>
    <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js"></script>
  </body>
</html>
